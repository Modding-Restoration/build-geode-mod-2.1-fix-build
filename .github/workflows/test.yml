name: Test the action

on:
  workflow_dispatch:
  push:
    branches:
      - "main"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        # - name: Windows
        #   os: windows-latest
          
        - name: macOS
          os: macos-latest

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          repository: geode-sdk/textureldr@main
          ref: 91a94dbf7450ec2b4ebdb866c5114ee1697927bc
          path: textureldr

      - name: Build the mod
        uses: Modding-Restoration/build-geode-mod-2.1-fix-build@main
        with:
          sdk: v1.3.10
          cli: v2.5.0
          build-config: RelWithDebInfo
          path: textureldr
